name: Actions 😎

on:
  push:
    branches:
      - main
    paths:
      - 'Assets/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'Assets/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
      - '.github/workflows/**'
  workflow_dispatch:
  release:
    types: [published]

jobs:
  test:
    name: Test my project 🧪
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: sloppy_sloths_user
          POSTGRES_PASSWORD: secretpassword
          POSTGRES_DB: sloppy_sloths_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sloppy_sloths_user -d sloppy_sloths_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # Free Disk Space
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # Cache
      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      # Start TS Server for Integration Tests
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start TS Server
        working-directory: ./Server
        env:
          PGUSER: sloppy_sloths_user
          PGPASSWORD: secretpassword
          PGDATABASE: sloppy_sloths_test
          PGHOST: localhost
          PGPORT: 5432
          MAPS_DIRECTORY: ./map-files
          JWT_SECRET: supersecretkey
          PORT: 3000
          HOST: 0.0.0.0
        run: |
          npm ci
          npm run db:reset || true
          npm run seed || true
          npm run start &
          sleep 5

      # Patch Unity server URL to hit the host runner from inside GameCI docker container
      - name: Patch Server URL
        run: |
          sed -i 's/127.0.0.1/172.17.0.1/g' Assets/Prefabs/MapBuilder/ServerInteraction/UnityServerDriver.cs
          sed -i 's/127.0.0.1/172.17.0.1/g' Assets/Prefabs/MapBuilder/ServerInteraction/ServerDriver.asset || true

      # Test
      - name: Run tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: EditMode Test Results
          unityVersion: auto

      - uses: actions/upload-artifact@v4
        with:
          name: Build
          path: build

  build:
    needs: test
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    name: Build my project ✨
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - WebGL
          - StandaloneWindows64
          - StandaloneLinux64
          - Android

    permissions:
        checks: write
        contents: read
        pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          unityVersion: auto

      - uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}
